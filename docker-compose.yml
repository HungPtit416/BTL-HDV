services:
  # User Service Database
  user_db:
    image: postgres:15-alpine
    container_name: user_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service_db
    ports:
      - "5432:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./services/user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdv-network

  # User Service
  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: user_db
      DB_PORT: 5432
      DB_NAME: user_service_db
      NODE_ENV: development
    depends_on:
      user_db:
        condition: service_healthy
    volumes:
      - ./services/user-service:/app
      - /app/node_modules
    networks:
      - hdv-network

  # Product Service Database
  product_db:
    image: postgres:15-alpine
    container_name: product_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_service_db
    ports:
      - "5433:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data
      - ./services/product-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdv-network

  # Product Service
  product-service:
    build: ./services/product-service
    container_name: product-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: product_db
      DB_PORT: 5432
      DB_NAME: product_service_db
      NODE_ENV: development
      ORDER_INTERNAL_SECRET: ${ORDER_INTERNAL_SECRET:-order_internal_secret_dev}
    depends_on:
      product_db:
        condition: service_healthy
    volumes:
      - ./services/product-service:/app
      - /app/node_modules
    networks:
      - hdv-network

  # Order Service Database
  order_db:
    image: postgres:15-alpine
    container_name: order_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_service_db
    ports:
      - "5434:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
      - ./services/order-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdv-network

  # Order Service
  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: order_db
      DB_PORT: 5432
      DB_NAME: order_service_db
      NODE_ENV: development
      PRODUCT_SERVICE_URL: http://product-service:3002
      PAYMENT_SERVICE_URL: http://payment-service:3005
      USER_SERVICE_URL: http://user-service:3001
      ORDER_INTERNAL_SECRET: ${ORDER_INTERNAL_SECRET:-order_internal_secret_dev}
      ORDER_AUTO_CANCEL_MINUTES: 5
    depends_on:
      order_db:
        condition: service_healthy
    volumes:
      - ./services/order-service:/app
      - /app/node_modules
    networks:
      - hdv-network

  # Notification Service Database
  notification_db:
    image: postgres:15-alpine
    container_name: notification_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_service_db
    ports:
      - "5435:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
      - ./services/notification-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdv-network

  # Notification Service
  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: notification_db
      DB_PORT: 5432
      DB_NAME: notification_service_db
      NODE_ENV: development
      INTERNAL_EVENT_SECRET: ${ORDER_INTERNAL_SECRET:-order_internal_secret_dev}
    depends_on:
      notification_db:
        condition: service_healthy
    volumes:
      - ./services/notification-service:/app
      - /app/node_modules
    networks:
      - hdv-network

  # Payment Service Database
  payment_db:
    image: postgres:15-alpine
    container_name: payment_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_service_db
    ports:
      - "5436:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
      - ./services/payment-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hdv-network

  # Payment Service
  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: payment_db
      DB_PORT: 5432
      DB_NAME: payment_service_db
      NODE_ENV: development
      ORDER_SERVICE_URL: http://order-service:3003
      ORDER_INTERNAL_SECRET: ${ORDER_INTERNAL_SECRET:-order_internal_secret_dev}
      INTERNAL_EVENT_SECRET: ${ORDER_INTERNAL_SECRET:-order_internal_secret_dev}
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      payment_db:
        condition: service_healthy
    volumes:
      - ./services/payment-service:/app
      - /app/node_modules
    networks:
      - hdv-network

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    networks:
      - hdv-network

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_USER_SERVICE_URL=http://localhost:3001/api/users
    networks:
      - hdv-network

volumes:
  user_db_data:
  product_db_data:
  order_db_data:
  notification_db_data:
  payment_db_data:

networks:
  hdv-network:
    driver: bridge
